<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CrossFit" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Mamba Booking</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #13131a;
      --border:    #1e1e2e;
      --text:      #e8e8f0;
      --muted:     #55556a;
      --idle:      #1e1e2e;
      --idle-text: #7070a0;
      --pending:   #2a2000;
      --pending-b: #f5c400;
      --pending-t: #f5c400;
      --booked:    #002a10;
      --booked-b:  #00c853;
      --booked-t:  #00c853;
      --error:     #2a0010;
      --error-b:   #ff3060;
      --error-t:   #ff3060;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      width: 100%;
      padding: 52px 28px 24px;
      position: relative;
    }
    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }
    header h1 span {
      color: var(--pending-b);
    }
    .header-date {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── Week info ── */
    .week-info {
      width: 100%;
      padding: 0 28px 28px;
    }
    .week-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .week-pill strong { color: var(--text); font-weight: 500; }

    /* ── Days grid ── */
    .days {
      width: 100%;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .day-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    .day-card:active { transform: scale(0.975); }

    .day-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--idle-text);
      border-radius: 4px 0 0 4px;
      transition: background 0.2s ease;
    }

    /* States */
    .day-card.pending {
      background: var(--pending);
      border-color: var(--pending-b);
    }
    .day-card.pending::before { background: var(--pending-b); }

    .day-card.booked {
      background: var(--booked);
      border-color: var(--booked-b);
    }
    .day-card.booked::before { background: var(--booked-b); }

    .day-card.error {
      background: var(--error);
      border-color: var(--error-b);
    }
    .day-card.error::before { background: var(--error-b); }

    .day-card.locked {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Card content */
    .day-left { display: flex; flex-direction: column; gap: 3px; }

    .day-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--idle-text);
      transition: color 0.2s ease;
    }
    .day-card.pending .day-name { color: var(--pending-t); }
    .day-card.booked  .day-name { color: var(--booked-t); }
    .day-card.error   .day-name { color: var(--error-t); }

    .day-meta {
      font-size: 12px;
      color: var(--muted);
      font-weight: 300;
    }
    .day-card.pending .day-meta,
    .day-card.booked  .day-meta { color: inherit; opacity: 0.7; }

    .day-right { display: flex; align-items: center; gap: 10px; }

    .status-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      border-radius: 8px;
      background: var(--border);
      color: var(--muted);
      transition: all 0.2s ease;
    }
    .day-card.pending .status-badge {
      background: rgba(245,196,0,0.15);
      color: var(--pending-t);
    }
    .day-card.booked .status-badge {
      background: rgba(0,200,83,0.15);
      color: var(--booked-t);
    }
    .day-card.error .status-badge {
      background: rgba(255,48,96,0.15);
      color: var(--error-t);
    }

    .status-icon {
      font-size: 20px;
      min-width: 24px;
      text-align: center;
    }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(245,196,0,0.3);
      border-top-color: var(--pending-b);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .day-card.pending .spinner { display: block; }
    .day-card.pending .status-icon { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex; align-items: flex-end;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.visible {
      opacity: 1; pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 48px;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-overlay.visible .modal {
      transform: translateY(0);
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 24px;
    }
    .modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .modal p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .modal p strong { color: var(--text); }
    .modal-actions { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn-confirm {
      background: var(--pending-b);
      color: #000;
    }
    .btn-cancel {
      background: var(--border);
      color: var(--muted);
    }
    .btn-cancel-booking {
      background: var(--error);
      color: var(--error-t);
      border: 1px solid var(--error-b);
    }

    /* ── Config modal ── */
    .config-btn {
      position: absolute;
      right: 28px; top: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 18px;
      cursor: pointer;
      color: var(--muted);
    }

    .config-form { display: flex; flex-direction: column; gap: 16px; }
    .config-field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .config-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
    }
    .config-field input:focus { border-color: var(--pending-b); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 200;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      margin-top: 36px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 0 28px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Mamba Bierzo</div>
  <h1>CROSS<span>FIT</span></h1>
  <div class="header-date" id="headerDate"></div>
  <button class="config-btn" onclick="openConfig()" title="Configuración">⚙️</button>
</header>

<div class="week-info">
  <div class="week-pill">
    📅 Reservando para: <strong id="weekTarget"></strong>
  </div>
</div>

<div class="days" id="daysContainer"></div>

<footer>
  Pulsa un día para programar la reserva automática.<br>
  Se ejecutará cuando abra la inscripción (18:31h).
</footer>

<!-- Modal confirmación / cancelación -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle"></h2>
    <p id="modalDesc"></p>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG (se guarda en localStorage) ───────────────────────────────────────
const CONFIG_KEY = 'crossfit_config';

function getConfig() {
  try {
    return JSON.parse(localStorage.getItem(CONFIG_KEY)) || {};
  } catch { return {}; }
}
function saveConfig(cfg) {
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
}

// ─── ESTADO ───────────────────────────────────────────────────────────────────
// Estados por día: idle | pending | booked | error
// Se guarda: { estado, targetDate (ISO), scheduledFor (ISO), cronjobId }
const STATE_KEY = 'crossfit_days';

function getState() {
  try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; } catch { return {}; }
}
function setState(s) {
  localStorage.setItem(STATE_KEY, JSON.stringify(s));
}

// ─── DÍAS ─────────────────────────────────────────────────────────────────────
const DAYS = [
  { key: 'lunes',     label: 'Lunes',     daysAhead: 0 },
  { key: 'martes',    label: 'Martes',    daysAhead: 0 },
  { key: 'miercoles', label: 'Miércoles', daysAhead: 0 },
  { key: 'jueves',    label: 'Jueves',    daysAhead: 0 },
  { key: 'viernes',   label: 'Viernes',   daysAhead: 0 },
];

// Regla: para reservar la clase del día X, la inscripción abre 4 días antes a las 18:30
// Si hoy es antes de 4 días antes de X → próximo X en 7+ días
// Si hoy es el día de apertura o después → próximo X de la semana siguiente

const DAY_INDEX = { lunes:1, martes:2, miercoles:3, jueves:4, viernes:5, sabado:6, domingo:0 };

function nextClassDate(dayKey) {
  // Devuelve la fecha de la próxima clase reservable para este día
  // "reservable" = la inscripción aún no ha cerrado (apertura = 4 días antes a las 18:30)
  const now = new Date();
  const targetDow = DAY_INDEX[dayKey]; // 1=lun, 2=mar...

  // Encontrar el próximo (o este) día de la semana
  function nextOccurrence(fromDate, dow) {
    const d = new Date(fromDate);
    const diff = (dow - d.getDay() + 7) % 7;
    d.setDate(d.getDate() + (diff === 0 ? 7 : diff));
    d.setHours(17, 0, 0, 0);
    return d;
  }

  // La apertura de inscripción es 4 días antes a las 18:30
  function openingDate(classDate) {
    const o = new Date(classDate);
    o.setDate(o.getDate() - 4);
    o.setHours(18, 30, 0, 0);
    return o;
  }

  // Buscar la próxima clase cuya inscripción aún no ha abierto o acaba de abrir
  let candidate = nextOccurrence(now, targetDow);
  let opening = openingDate(candidate);

  // Si la apertura ya pasó, ir a la semana siguiente
  if (opening <= now) {
    candidate = nextOccurrence(new Date(candidate.getTime() + 1), targetDow);
    opening = openingDate(candidate);
  }

  return { classDate: candidate, openingDate: opening };
}

function formatDate(date) {
  return date.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
}
function formatDateLong(date) {
  return date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  // Semana target (lunes próximo)
  const monday = new Date(now);
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  monday.setDate(monday.getDate() - dow + 7);
  const friday = new Date(monday); friday.setDate(monday.getDate() + 4);
  document.getElementById('weekTarget').textContent =
    `semana del ${monday.toLocaleDateString('es-ES',{day:'numeric',month:'short'})} al ${friday.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`;

  const state = getState();
  const container = document.getElementById('daysContainer');
  container.innerHTML = '';

  // Limpiar estados caducados (clase ya pasó)
  cleanExpiredStates(state);

  DAYS.forEach(day => {
    const s = state[day.key] || { status: 'idle' };
    const { classDate, openingDate } = nextClassDate(day.key);

    const card = document.createElement('div');
    card.className = `day-card ${s.status}`;
    card.dataset.day = day.key;

    // Locked si ya está pendiente/reservado para otra fecha y no es cancelable
    if (s.status === 'locked') card.classList.add('locked');

    const statusLabels = {
      idle:    { icon: '＋', text: 'Programar' },
      pending: { icon: '⏳', text: 'Pendiente' },
      booked:  { icon: '✓',  text: 'Reservado' },
      error:   { icon: '✕',  text: 'Error' },
    };
    const sl = statusLabels[s.status] || statusLabels.idle;

    const daysUntilOpen = Math.ceil((openingDate - now) / (1000*60*60*24));
    let metaText = `${formatDate(classDate)} · 17:00h`;
    if (s.status === 'pending') {
      metaText = `Abre el ${formatDate(openingDate)} a las 18:31h`;
    } else if (s.status === 'booked') {
      metaText = `${formatDate(classDate)} · Confirmado ✓`;
    }

    card.innerHTML = `
      <div class="day-left">
        <div class="day-name">${day.label}</div>
        <div class="day-meta">${metaText}</div>
      </div>
      <div class="day-right">
        <div class="status-badge">${sl.text}</div>
        <div class="status-icon">${sl.icon}</div>
        <div class="spinner"></div>
      </div>
    `;

    card.addEventListener('click', () => handleDayClick(day.key, s.status, classDate, openingDate));
    container.appendChild(card);
  });
}

function cleanExpiredStates(state) {
  const now = new Date();
  let changed = false;
  Object.keys(state).forEach(key => {
    const s = state[key];
    if ((s.status === 'booked' || s.status === 'pending') && s.classDate) {
      const classDate = new Date(s.classDate);
      const dayAfter = new Date(classDate);
      dayAfter.setDate(dayAfter.getDate() + 1);
      dayAfter.setHours(0, 0, 0, 0);
      if (now >= dayAfter) {
        delete state[key];
        changed = true;
      }
    }
  });
  if (changed) setState(state);
}

// ─── INTERACCIÓN ──────────────────────────────────────────────────────────────
let pendingAction = null;

function handleDayClick(dayKey, status, classDate, openingDate) {
  const cfg = getConfig();
  if (!cfg.githubToken || !cfg.cronjobKey) {
    openConfig();
    showToast('⚙️ Configura primero tus credenciales');
    return;
  }

  const dayLabel = DAYS.find(d => d.key === dayKey).label;

  if (status === 'idle' || status === 'error') {
    // Confirmar programación
    pendingAction = { type: 'schedule', dayKey, classDate, openingDate };
    showModal(
      `Reservar ${dayLabel}`,
      `Se programará la reserva para el <strong>${formatDateLong(classDate)}</strong> a las 17:00h.<br><br>
       La inscripción se realizará automáticamente el <strong>${formatDateLong(openingDate)}</strong> a las 18:31h.`,
      [
        { label: '⚡ Programar reserva', cls: 'btn-confirm', action: 'confirm' },
        { label: 'Cancelar', cls: 'btn-cancel', action: 'close' },
      ]
    );
  } else if (status === 'pending') {
    pendingAction = { type: 'cancel', dayKey };
    showModal(
      `Cancelar ${dayLabel}`,
      `¿Quieres cancelar la reserva programada para el <strong>${formatDateLong(classDate)}</strong>?`,
      [
        { label: '🗑 Cancelar reserva programada', cls: 'btn-cancel-booking', action: 'confirm' },
        { label: 'Mantener', cls: 'btn-cancel', action: 'close' },
      ]
    );
  } else if (status === 'booked') {
    showModal(
      `${dayLabel} ✓`,
      `Ya estás apuntado a la clase del <strong>${formatDateLong(classDate)}</strong> a las 17:00h.<br><br>
       El botón se liberará el día después de la clase.`,
      [{ label: 'Cerrar', cls: 'btn-cancel', action: 'close' }]
    );
  }
}

async function confirmAction() {
  closeModal();
  if (!pendingAction) return;

  if (pendingAction.type === 'schedule') {
    await scheduleBooking(pendingAction.dayKey, pendingAction.classDate, pendingAction.openingDate);
  } else if (pendingAction.type === 'cancel') {
    await cancelBooking(pendingAction.dayKey);
  }
  pendingAction = null;
}

// ─── GITHUB ACTIONS + CRONJOB ─────────────────────────────────────────────────
async function scheduleBooking(dayKey, classDate, openingDate) {
  const cfg = getConfig();
  const state = getState();

  // Actualizar estado a pending inmediatamente
  const daysAhead = Math.round((classDate - new Date()) / (1000*60*60*24));
  state[dayKey] = {
    status: 'pending',
    classDate: classDate.toISOString(),
    openingDate: openingDate.toISOString(),
    daysAhead,
  };
  setState(state);
  render();

  try {
    const cronTime = openingDate;

    // expiresAt format: YYYYMMDDhhmmss (5 min after opening)
    const exp = new Date(cronTime.getTime() + 5 * 60 * 1000);
    const pad = n => String(n).padStart(2, '0');
    const expiresAt = Number(
      `${exp.getFullYear()}${pad(exp.getMonth()+1)}${pad(exp.getDate())}${pad(exp.getHours())}${pad(exp.getMinutes())}${pad(exp.getSeconds())}`
    );

    const cronBody = {
      job: {
        title: `CrossFit ${dayKey} ${classDate.toLocaleDateString('es-ES')}`,
        url: `https://api.github.com/repos/${cfg.githubUser}/crossfit-autobook/actions/workflows/reservar.yml/dispatches`,
        enabled: true,
        saveResponses: true,
        schedule: {
          timezone: "Europe/Madrid",
          expiresAt: expiresAt,
          hours: [cronTime.getHours()],
          mdays: [cronTime.getDate()],
          minutes: [cronTime.getMinutes()],
          months: [cronTime.getMonth() + 1],
          wdays: [-1],
        },
        requestMethod: 1, // POST
        extendedData: {
          headers: {
            "Authorization": `Bearer ${cfg.githubToken}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28"
          },
          body: JSON.stringify({
            ref: "main",
            inputs: { days_ahead: String(daysAhead) }
          })
        }
      }
    };

    const res = await fetch('https://api.cron-job.org/jobs', {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${cfg.cronjobKey}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(cronBody),
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`cron-job.org error: ${res.status} ${err}`);
    }

    const data = await res.json();
    state[dayKey].cronjobId = data.jobId;
    setState(state);
    render();
    showToast('✅ Reserva programada correctamente');

  } catch (err) {
    console.error(err);
    state[dayKey] = { status: 'error', error: err.message };
    setState(state);
    render();
    showToast('❌ Error al programar: ' + err.message);
  }
}

async function cancelBooking(dayKey) {
  const cfg = getConfig();
  const state = getState();
  const s = state[dayKey];

  if (s && s.cronjobId) {
    try {
      await fetch(`https://api.cron-job.org/jobs/${s.cronjobId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${cfg.cronjobKey}` },
      });
    } catch(e) { console.warn('No se pudo borrar el cron job:', e); }
  }

  delete state[dayKey];
  setState(state);
  render();
  showToast('🗑 Reserva cancelada');
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showModal(title, desc, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').innerHTML = desc;
  const actionsEl = document.getElementById('modalActions');
  actionsEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `btn ${a.cls}`;
    btn.textContent = a.label;
    btn.onclick = a.action === 'confirm' ? confirmAction : closeModal;
    actionsEl.appendChild(btn);
  });
  document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('visible');
}

// ─── CONFIG ───────────────────────────────────────────────────────────────────
function openConfig() {
  const cfg = getConfig();
  document.getElementById('modalTitle').textContent = 'Configuración';
  document.getElementById('modalDesc').innerHTML = 'Introduce tus credenciales. Se guardan solo en este dispositivo.';
  const actionsEl = document.getElementById('modalActions');
  actionsEl.innerHTML = `
    <div class="config-form">
      <div class="config-field">
        <label>Usuario GitHub</label>
        <input id="cfgUser" type="text" placeholder="Azrak95" value="${cfg.githubUser||''}" />
      </div>
      <div class="config-field">
        <label>Token GitHub (ghp_...)</label>
        <input id="cfgToken" type="password" placeholder="ghp_xxxxxxxxxxxx" value="${cfg.githubToken||''}" />
      </div>
      <div class="config-field">
        <label>API Key cron-job.org</label>
        <input id="cfgCron" type="password" placeholder="xxxxxxxxxxxxxxxx" value="${cfg.cronjobKey||''}" />
      </div>
      <button class="btn btn-confirm" onclick="saveConfigForm()">Guardar</button>
      <button class="btn btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('visible');
}

function saveConfigForm() {
  const cfg = {
    githubUser:  document.getElementById('cfgUser').value.trim(),
    githubToken: document.getElementById('cfgToken').value.trim(),
    cronjobKey:  document.getElementById('cfgCron').value.trim(),
  };
  saveConfig(cfg);
  closeModal();
  showToast('✅ Configuración guardada');
  render();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── POLLING: comprobar si GitHub Actions completó la reserva ─────────────────
async function checkPendingBookings() {
  const cfg = getConfig();
  if (!cfg.githubToken || !cfg.githubUser) return;

  const state = getState();
  let changed = false;

  for (const dayKey of Object.keys(state)) {
    const s = state[dayKey];
    if (s.status !== 'pending') continue;

    // Solo comprobar si ya ha pasado la hora de apertura
    const openingDate = new Date(s.openingDate);
    if (new Date() < openingDate) continue;

    try {
      const res = await fetch(
        `https://api.github.com/repos/${cfg.githubUser}/crossfit-autobook/actions/runs?per_page=10`,
        {
          headers: {
            'Authorization': `Bearer ${cfg.githubToken}`,
            'Accept': 'application/vnd.github+json',
          }
        }
      );
      if (!res.ok) continue;

      const data = await res.json();
      const runs = data.workflow_runs || [];

      // Buscar un run exitoso después de la hora de apertura
      const openingTs = openingDate.getTime();
      const successRun = runs.find(r =>
        r.status === 'completed' &&
        r.conclusion === 'success' &&
        new Date(r.created_at).getTime() >= openingTs - 5 * 60 * 1000
      );

      if (successRun) {
        state[dayKey].status = 'booked';
        changed = true;
        showToast(`✅ ¡${dayKey.charAt(0).toUpperCase() + dayKey.slice(1)} reservado!`);
      }

      // Si falló
      const failedRun = runs.find(r =>
        r.status === 'completed' &&
        r.conclusion !== 'success' &&
        new Date(r.created_at).getTime() >= openingTs - 5 * 60 * 1000
      );
      if (failedRun && !successRun) {
        state[dayKey].status = 'error';
        state[dayKey].error = 'El workflow de GitHub falló';
        changed = true;
        showToast(`❌ Error al reservar ${dayKey}`);
      }

    } catch(e) {
      console.warn('Error comprobando GitHub Actions:', e);
    }
  }

  if (changed) {
    setState(state);
    render();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();

// Refrescar render cada minuto
setInterval(render, 60000);

// Comprobar estado de GitHub cada 3 minutos
setInterval(checkPendingBookings, 3 * 60 * 1000);

// Comprobar también al cargar (por si se abre la app después de la hora de apertura)
setTimeout(checkPendingBookings, 3000);
</script>
